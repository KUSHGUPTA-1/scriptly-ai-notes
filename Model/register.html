<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Scriptly</title>
  <link rel="stylesheet" href="style2.css"> 
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
  <header>
      <h1><b>Welcome to Scriptly</b></h1>
      <p><b>“From speech to smart notes — fast, accurate, effortless.”</b></p>
  </header>

  <div class="auth-container">
      <h2><b>Register</b></h2>
      <input type="email" id="email" placeholder="Enter your email" required>
      <input type="password" id="password" placeholder="Enter your password" required>
      <button id="registerBtn">Register</button>
      <div class="message" id="message"></div>
      <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>

  <script>
    document.getElementById('registerBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      messageDiv.textContent = '';

      if(!email || !password){
          messageDiv.textContent = "Please enter email and password.";
          return;
      }

      try {
          const response = await fetch('http://localhost:5000/api/users/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password }),
              credentials: 'include' 
          });

          const data = await response.json();

          if(data.error){
              messageDiv.textContent = "Error: " + data.error;
          } else {
              messageDiv.textContent = "Registration successful! Redirecting to login...";
              setTimeout(() => {
                  window.location.href = "login.html";
              }, 1500);
          }

      } catch(err){
          messageDiv.textContent = "Error connecting to server.";
          console.error(err);
      }
    });
  </script>
<script>window.SCRIPTLY_BACKEND = 'http://localhost:5000';</script>
<script src="chat.js"></script>
</body>
</html>
